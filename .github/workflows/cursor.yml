name: Cursor Agent

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

concurrency:
  group: cursor-agent-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  cursor:
    if: >-
      (github.event_name == 'issues' && (github.event.label.name == 'cursor' || github.event.label.name == 'claude') &&
       contains(fromJson('["arogut"]'), github.event.sender.login)) ||
      (github.event_name == 'issue_comment' && (contains(github.event.comment.body, '@cursor') || contains(github.event.comment.body, '@claude')) &&
       contains(fromJson('["OWNER", "MEMBER"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' && (contains(github.event.review.body, '@cursor') || contains(github.event.review.body, '@claude')) &&
       contains(fromJson('["OWNER", "MEMBER"]'), github.event.review.author_association) &&
       (github.event.pull_request.head.repo.full_name == github.repository)) ||
      (github.event_name == 'pull_request_review_comment' && (contains(github.event.comment.body, '@cursor') || contains(github.event.comment.body, '@claude')) &&
       contains(fromJson('["OWNER", "MEMBER"]'), github.event.comment.author_association) &&
       (github.event.pull_request.head.repo.full_name == github.repository))

    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2.1.0
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Resolve checkout ref
        id: target-ref
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          case "${{ github.event_name }}" in
            pull_request_review|pull_request_review_comment)
              echo "ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
              ;;
            issue_comment)
              if PR_SHA=$(gh pr view "${{ github.event.issue.number }}" --json headRefOid -q .headRefOid 2>/dev/null); then
                echo "ref=${PR_SHA}" >> "$GITHUB_OUTPUT"
              else
                echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
              fi
              ;;
            *)
              echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ steps.target-ref.outputs.ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Configure git
        run: |
          git config user.name "Cursor Agent"
          git config user.email "cursoragent@users.noreply.github.com"

      - name: Write event context
        id: agent-context
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          mkdir -p .github/cursor

          ISSUE_NUMBER="${{ github.event.issue.number }}"
          if [ -z "$ISSUE_NUMBER" ]; then
            ISSUE_NUMBER="${{ github.event.pull_request.number }}"
          fi
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

          case "${{ github.event_name }}" in
            issues)
              gh issue view "$ISSUE_NUMBER" --json title,body \
                --jq '"Title: \(.title)\n\n\(.body)"' > .github/cursor/.event-context.txt
              ;;
            issue_comment)
              {
                echo "Comment by ${{ github.event.comment.user.login }}:"
                echo
                echo "${{ github.event.comment.body }}"
              } > .github/cursor/.event-context.txt
              ;;
            pull_request_review)
              {
                echo "PR review by ${{ github.event.review.user.login }}:"
                echo
                echo "${{ github.event.review.body }}"
              } > .github/cursor/.event-context.txt
              ;;
            pull_request_review_comment)
              {
                echo "Inline PR comment by ${{ github.event.comment.user.login }} on ${{ github.event.comment.path }}:${{ github.event.comment.line }}:"
                echo
                echo "${{ github.event.comment.body }}"
              } > .github/cursor/.event-context.txt
              ;;
            *)
              echo "No additional event context." > .github/cursor/.event-context.txt
              ;;
          esac

      - name: Run Cursor agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          ISSUE_NUMBER: ${{ steps.agent-context.outputs.issue_number }}
        run: bash .github/cursor/run-cursor-agent.sh .github/cursor/cli-agent.json .github/cursor/prompts/agent.md
