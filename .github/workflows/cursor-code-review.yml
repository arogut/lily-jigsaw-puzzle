name: Cursor Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: number
      model:
        description: Model slug (use "auto", or any id from "agent models" — listed in job logs after install)
        required: true
        default: auto
        type: string

concurrency:
  group: cursor-review-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  cursor-review:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2.1.0
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Resolve review context
        id: review-context
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
            REQUESTED_MODEL="${{ github.event.inputs.model }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
            REQUESTED_MODEL="auto"
          fi

          PR_JSON=$(gh pr view "$PR_NUMBER" --json headRefOid,baseRefOid,isDraft)
          if [ "$(echo "$PR_JSON" | jq -r '.isDraft')" = "true" ]; then
            echo "PR #${PR_NUMBER} is a draft — skipping review."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(echo "$PR_JSON" | jq -r '.headRefOid')" >> "$GITHUB_OUTPUT"
          echo "base_sha=$(echo "$PR_JSON" | jq -r '.baseRefOid')" >> "$GITHUB_OUTPUT"
          echo "requested_model=${REQUESTED_MODEL}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: steps.review-context.outputs.skip != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ steps.review-context.outputs.head_sha }}
          fetch-depth: 0

      - name: Install Cursor CLI
        if: steps.review-context.outputs.skip != 'true'
        run: bash .github/cursor/install-cursor-cli.sh

      - name: Resolve Cursor model
        if: steps.review-context.outputs.skip != 'true'
        id: cursor-model
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_MODEL: ${{ steps.review-context.outputs.requested_model }}
        run: |
          echo "Available Cursor models for this account:"
          if command -v agent >/dev/null 2>&1; then
            agent models
          else
            cursor-agent --list-models
          fi

          RESOLVED_MODEL="$(bash .github/cursor/resolve-cursor-model.sh)"
          echo "Using model: ${RESOLVED_MODEL}"
          echo "model=${RESOLVED_MODEL}" >> "$GITHUB_OUTPUT"

      - name: Run Cursor review agent
        if: steps.review-context.outputs.skip != 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_MODEL: ${{ steps.cursor-model.outputs.model }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.review-context.outputs.pr_number }}
          PR_HEAD_SHA: ${{ steps.review-context.outputs.head_sha }}
          PR_BASE_SHA: ${{ steps.review-context.outputs.base_sha }}
        run: bash .github/cursor/run-cursor-agent.sh .github/cursor/cli-review.json .github/cursor/prompts/review.md
