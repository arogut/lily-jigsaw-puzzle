name: Cursor CI Fix

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  cursor-ci-fix:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.actor.type == 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read

    steps:
      - name: Get PR number from workflow run
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          PR_JSON: ${{ toJson(github.event.workflow_run.pull_requests) }}
        run: |
          PR_NUMBER=$(echo "$PR_JSON" | jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(gh api "repos/${{ github.repository }}/pulls?state=open&per_page=50" \
              --jq ".[] | select(.head.sha == \"${{ github.event.workflow_run.head_sha }}\") | .number" | head -1)
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Skip if PR number not found
        if: steps.pr.outputs.number == ''
        run: echo "Could not determine PR number — skipping auto-fix."

      - name: Generate GitHub App token
        if: steps.pr.outputs.number != ''
        id: app-token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2.1.0
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout PR branch
        if: steps.pr.outputs.number != ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Set up Flutter
        if: steps.pr.outputs.number != ''
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Install Cursor CLI
        if: steps.pr.outputs.number != ''
        run: bash .github/cursor/install-cursor-cli.sh

      - name: Configure git
        if: steps.pr.outputs.number != ''
        run: |
          git config user.name "Cursor Agent"
          git config user.email "cursoragent@users.noreply.github.com"

      - name: Run Cursor agent to fix CI
        if: steps.pr.outputs.number != ''
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: workflow_run
          ACTOR: ${{ github.event.workflow_run.actor.login }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: bash .github/cursor/run-cursor-agent.sh .github/cursor/cli-agent.json .github/cursor/prompts/ci-fix.md
