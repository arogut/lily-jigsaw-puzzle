name: Claude Code Fix CI Issues

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  claude-ci-fix:
  
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.actor.type == 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Get PR number from workflow run
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          PR_JSON: ${{ toJson(github.event.workflow_run.pull_requests) }}
        run: |
          PR_NUMBER=$(echo "$PR_JSON" | jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(gh api "repos/${{ github.repository }}/pulls?state=open&per_page=50" \
              --jq ".[] | select(.head.sha == \"${{ github.event.workflow_run.head_sha }}\") | .number" | head -1)
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "branch=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"

      - name: Skip if PR number not found
        if: steps.pr.outputs.number == ''
        run: |
          echo "Could not determine PR number — skipping auto-fix."
          exit 0

      - name: Generate GitHub App token
        id: app-token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 1

      - name: Run Claude to fix CI failures
        uses: anthropics/claude-code-action@0432df8bfe0572278dd19bca33be32cdc8061ebb # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          
          pr_number: ${{ steps.pr.outputs.number }}
          
          additional_permissions: |
            actions: read
          
          prompt: |
            CI has failed on PR #${{ steps.pr.outputs.number }} (branch: ${{ steps.pr.outputs.branch }}) which you raised.

            Diagnose and fix the failures so the build goes green:
            1. gh run list --branch "${{ steps.pr.outputs.branch }}" --limit 5
            2. gh run view RUN_ID --log-failed
            3. Fix the root cause in source code
            4. flutter analyze && flutter test
            5. Commit and push the fix to branch: ${{ steps.pr.outputs.branch }}

            **COMMIT RULES:**
            - Do NOT add "Co-authored-by" lines
            - Do NOT add "Generated with Claude Code" attributions
            - Keep commits clean and professional
          
            **WHEN WORKING ON PR FEEDBACK:**
            Make the requested changes and commit. The PR will automatically update - do NOT create a new PR.
          
            **WHEN FIXING CI FAILURES:**
            Fix the issues, commit the fix. The CI will automatically re-run.
          
            ** Commit Message Requirements (max 72 chars)
            - Imperative mood: "Add" not "Added"
            - Action verbs: Add, Update, Fix, Remove, Refactor, Implement
            - No articles (a, an, the)
            - No punctuation at end
            - No prefixes like "feat:", "fix:"
            - Single line only
            - NO co-author attributions          
          
          track_progress: true

          claude_args: |
            --model "claude-sonnet-4-6"
            --max-turns 50
            --allowedTools "Bash(git:*),Bash(gh issue:*),Bash(gh pr:*),Bash(gh repo:*),Bash(gh run:*),Bash(flutter:*),Edit,Write,Read,Glob,Grep,LS,WebSearch,WebFetch"
