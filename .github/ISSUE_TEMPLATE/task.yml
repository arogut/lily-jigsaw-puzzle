name: Task
description: Create a technical task or work item
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to create a technical task or work item that needs to be completed.

  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: A clear and concise description of what needs to be done.
      placeholder: Describe the task...
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: List the criteria that must be met for this task to be considered complete.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: true

  - type: textarea
    id: technical-details
    attributes:
      label: Technical Details
      description: Any technical details, implementation notes, or considerations.
      placeholder: Add technical details here...
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: List any dependencies or blockers for this task.
      placeholder: |
        - Depends on #123
        - Requires API changes
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context or information about the task here.
      placeholder: Any additional information...
    validations:
      required: false
