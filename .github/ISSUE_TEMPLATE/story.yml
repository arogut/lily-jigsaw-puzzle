name: Story
description: Create a user story describing a feature from a user's perspective
labels: ["story"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to create a user story that describes a feature or functionality from a user's perspective.

  - type: textarea
    id: user-story
    attributes:
      label: User Story
      description: Describe the feature using the user story format.
      placeholder: |
        As a [type of user],
        I want [some goal or desire],
        So that [benefit or value].
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Provide additional context and details about the story.
      placeholder: Add more details about the story...
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: List the criteria that must be met for this story to be considered complete.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: true

  - type: textarea
    id: mockups
    attributes:
      label: Mockups / Wireframes
      description: If applicable, add mockups or wireframes to illustrate the feature.
      placeholder: Drag and drop images here...
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: List any dependencies or related issues.
      placeholder: |
        - Depends on #123
        - Related to #456
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the story here.
      placeholder: Any additional information...
    validations:
      required: false
